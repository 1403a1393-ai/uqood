<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عقود | تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #8A6E2F;
    --dark: #0C0E10;
    --dark-2: #131618;
    --dark-3: #1A1E22;
    --dark-4: #222830;
    --dark-5: #2C333C;
    --text-primary: #F0EDE6;
    --text-secondary: #9A9690;
    --text-muted: #5A5650;
    --border: rgba(201,168,76,0.15);
    --border-subtle: rgba(255,255,255,0.06);
    --green: #4ade80;
    --red: #f87171;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--dark);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-text {
    font-size: 32px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -1px;
  }

  .logo-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .card {
    background: var(--dark-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
  }

  .card-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .card-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: var(--dark-3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text-primary);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus {
    border-color: var(--gold);
  }

  .form-input::placeholder {
    color: var(--text-muted);
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .btn-login:hover {
    background: var(--gold-light);
  }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
    display: none;
  }

  .divider {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin: 20px 0;
    position: relative;
  }

  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--border);
  }

  .divider::before { right: 0; }
  .divider::after { left: 0; }

  .btn-register {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
    text-align: center;
  }

  .btn-register:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .forgot {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .forgot a {
    color: var(--gold);
    text-decoration: none;
  }

  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--dark);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .back-home {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .back-home a {
    color: var(--text-secondary);
    text-decoration: none;
  }

  .back-home a:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="login-container">

  <div class="logo">
    <div class="logo-text">عُقود</div>
    <div class="logo-sub">منصة المقاولات الموثوقة</div>
  </div>

  <div class="card">
    <div class="card-title">مرحباً بعودتك 👋</div>
    <div class="card-sub">سجّل دخولك للوصول لحسابك</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input class="form-input" type="email" id="emailInput" placeholder="example@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input class="form-input" type="password" id="passInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">
      تسجيل الدخول
    </button>

    <div class="divider">أو</div>

    <a href="register.html" class="btn-register">إنشاء حساب جديد</a>

    <a href="opportunities.html" class="btn-register" style="color:var(--text-primary);border-color:rgba(201,168,76,0.3);margin-top:4px;">
      اطّلع على الفرص بدون تسجيل
    </a>

    <div class="divider">أو</div>

    <div class="forgot">
      <a href="#" onclick="resetPassword()">نسيت كلمة المرور؟</a>
    </div>
  </div>

  <div class="back-home">
    <a href="index.html">← العودة للصفحة الرئيسية</a>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://mdoeyptqlvlqaavjwokm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_9Ndx83bLnhvnrIGM6su7Sw_udqeaA1y';
  const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // تسجيل خروج تلقائي عند فتح صفحة الدخول
  _supabase.auth.signOut();

  async function login() {
    const email = document.getElementById('emailInput').value.trim();
    const pass = document.getElementById('passInput').value;
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    if (!email || !pass) {
      showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'جارٍ الدخول <span class="loading"></span>';
    errorMsg.style.display = 'none';

    try {
      const { data, error } = await _supabase.auth.signInWithPassword({
        email: email,
        password: pass
      });

      if (error) throw error;

      // جلب نوع الحساب
      const { data: userData } = await _supabase
        .from('users')
        .select('account_type')
        .eq('id', data.user.id)
        .single();

      if (userData?.account_type === 'company') {
        window.location.href = 'company-dashboard.html';
      } else {
        window.location.href = 'contractor-dashboard.html';
      }

    } catch (err) {
      let msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
      if (err.message.includes('Email not confirmed')) {
        msg = 'يرجى تأكيد بريدك الإلكتروني أولاً';
      }
      showError(msg);
      btn.disabled = false;
      btn.innerHTML = 'تسجيل الدخول';
    }
  }

  async function resetPassword() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) {
      showError('أدخل بريدك الإلكتروني أولاً ثم اضغط "نسيت كلمة المرور"');
      return;
    }

    await _supabase.auth.resetPasswordForEmail(email);
    showError('✅ تم إرسال رابط إعادة تعيين كلمة المرور لبريدك');
    document.getElementById('errorMsg').style.background = 'rgba(74,222,128,0.1)';
    document.getElementById('errorMsg').style.borderColor = 'rgba(74,222,128,0.3)';
    document.getElementById('errorMsg').style.color = 'var(--green)';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
